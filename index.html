<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DayTracker - 30分钟时间管理法</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Google API 和身份验证服务 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes fadeInZoom {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in-zoom { animation: fadeInZoom 0.2s ease-out forwards; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-down { animation: slideDown 0.2s ease-out forwards; }
        
        @media (min-width: 768px) {
            .dynamic-sidebar { width: var(--sidebar-width) !important; }
        }
        
        body { margin: 0; overflow: hidden; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SVGS = {
            Laptop: '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="2" y1="20" x2="22" y2="20"/>',
            BookOpen: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
            Dumbbell: '<path d="M14.4 14.4l-4.8-4.8"/><path d="M6.9 15.6l-1.2 1.2a2 2 0 0 1-2.8-2.8l1.2-1.2"/><path d="M17.1 8.4l1.2-1.2a2 2 0 0 0-2.8-2.8l-1.2 1.2"/><path d="M8.3 12.8l-2.1-2.1"/><path d="M11.2 15.7l-2.1-2.1"/><path d="M12.8 8.3l2.1 2.1"/><path d="M15.7 11.2l2.1 2.1"/><path d="M5.5 10l-1.4 1.4"/><path d="M14 18.5l1.4-1.4"/>',
            Coffee: '<path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
            Gamepad2: '<line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/>',
            Moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
            Star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
            Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
            PieChart: '<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>',
            Calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
            CheckCircle2: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
            Edit2: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
            Trash2: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
            Check: '<polyline points="20 6 9 17 4 12"/>',
            Save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
            AlertTriangle: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
            Plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
            Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
            Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
            ChevronDown: '<polyline points="6 9 12 15 18 9"/>',
            ChevronRight: '<polyline points="9 18 15 12 9 6"/>',
            ChevronLeft: '<polyline points="15 18 9 12 15 6"/>',
            GripVertical: '<circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/>',
            Circle: '<circle cx="12" cy="12" r="10"/>',
            Music: '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>',
            ShoppingCart: '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>',
            Heart: '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>',
            Users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
            Cloud: '<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>',
            RefreshCw: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>'
        };

        const Icon = ({ name, size = 16, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: SVGS[name] || SVGS.Star }} />
        );

        const SLOT_HEIGHT = 48; 
        const TOTAL_SLOTS = 48;
        const COLLAPSED_SLEEP_HEIGHT = 80; 

        const PRESET_COLORS = [
            { color: 'bg-blue-500', border: 'border-blue-600', text: 'text-blue-100' },
            { color: 'bg-purple-500', border: 'border-purple-600', text: 'text-purple-100' },
            { color: 'bg-orange-500', border: 'border-orange-600', text: 'text-orange-100' },
            { color: 'bg-green-500', border: 'border-green-600', text: 'text-green-100' },
            { color: 'bg-pink-500', border: 'border-pink-600', text: 'text-pink-100' },
            { color: 'bg-indigo-500', border: 'border-indigo-600', text: 'text-indigo-100' },
            { color: 'bg-teal-500', border: 'border-teal-600', text: 'text-teal-100' },
            { color: 'bg-rose-500', border: 'border-rose-600', text: 'text-rose-100' },
            { color: 'bg-slate-600', border: 'border-slate-700', text: 'text-slate-200' },
            { color: 'bg-cyan-500', border: 'border-cyan-600', text: 'text-cyan-100' },
            { color: 'bg-amber-500', border: 'border-amber-600', text: 'text-amber-100' },
            { color: 'bg-red-500', border: 'border-red-600', text: 'text-red-100' },
            { color: 'bg-lime-500', border: 'border-lime-600', text: 'text-lime-100' }
        ];

        const PRESET_ICONS = ['Laptop', 'BookOpen', 'Dumbbell', 'Coffee', 'Gamepad2', 'Moon', 'Star', 'Clock', 'PieChart', 'Calendar', 'CheckCircle2', 'Edit2', 'Music', 'ShoppingCart', 'Heart', 'Users'];

        const DEFAULT_CATEGORIES = {
            WORK: { id: 'WORK', label: '深度工作', ...PRESET_COLORS[0], icon: 'Laptop', order: 0 },
            STUDY: { id: 'STUDY', label: '学习', ...PRESET_COLORS[1], icon: 'BookOpen', order: 1 },
            WORKOUT: { id: 'WORKOUT', label: '运动', ...PRESET_COLORS[2], icon: 'Dumbbell', order: 2 },
            REST: { id: 'REST', label: '休息/吃饭', ...PRESET_COLORS[3], icon: 'Coffee', order: 3 },
            ENTERTAINMENT: { id: 'ENTERTAINMENT', label: '娱乐', ...PRESET_COLORS[4], icon: 'Gamepad2', order: 4 },
            SLEEP: { id: 'SLEEP', label: '睡眠', ...PRESET_COLORS[8], icon: 'Moon', order: 5 },
        };

        const getTimeLabel = (index) => {
            const hour = Math.floor(index / 2);
            const min = index % 2 === 0 ? '00' : '30';
            return `${String(hour).padStart(2, '0')}:${min}`;
        };

        const getEmptySlots = () => Array(TOTAL_SLOTS).fill(null).map(() => ({ activity: '', categoryId: null, status: 'none', groupId: null }));

        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const hasDataForDate = (dateStr) => {
            try {
                const saved = localStorage.getItem(`day-tracker-slots-${dateStr}`);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return Array.isArray(parsed) && parsed.some(slot => slot && slot.categoryId !== null);
                }
            } catch(e) {}
            return false;
        };

        const getInitialSlots = (dateStr) => {
            try {
                const savedDate = localStorage.getItem(`day-tracker-slots-${dateStr}`);
                if (savedDate) {
                    const parsed = JSON.parse(savedDate);
                    if (Array.isArray(parsed) && parsed.length === TOTAL_SLOTS) return parsed;
                }
                if (dateStr === formatDate(new Date())) {
                    const savedLegacy = localStorage.getItem('day-tracker-slots');
                    if (savedLegacy) {
                        const parsedLegacy = JSON.parse(savedLegacy);
                        if (Array.isArray(parsedLegacy) && parsedLegacy.length === TOTAL_SLOTS) return parsedLegacy;
                    }
                }
            } catch(e) { console.error("Error loading slots:", e); }
            return getEmptySlots();
        };

        const getInitialCategories = () => {
            try {
                const saved = localStorage.getItem('day-tracker-categories');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (typeof parsed === 'object' && parsed !== null && !Array.isArray(parsed)) return parsed;
                }
            } catch(e) {}
            return DEFAULT_CATEGORIES;
        };

        const getDefaultTemplates = () => {
            const tpl = { workday: getEmptySlots(), weekend: getEmptySlots() };
            const fill = (target, startH, endH, cat, act) => {
                const gid = 'def_' + Math.random().toString(36).substr(2, 9);
                for(let i = Math.floor(startH * 2); i < Math.floor(endH * 2); i++) {
                    target[i] = { activity: act, categoryId: cat, status: 'in-progress', groupId: gid };
                }
            };
            fill(tpl.workday, 0, 7.5, 'SLEEP', '睡眠'); fill(tpl.workday, 7.5, 8.5, 'REST', '洗漱/早餐/通勤');
            fill(tpl.workday, 9, 12, 'WORK', '上午深度工作'); fill(tpl.workday, 12, 13.5, 'REST', '午餐与午休');
            fill(tpl.workday, 13.5, 18, 'WORK', '下午常规工作'); fill(tpl.workday, 18, 19.5, 'REST', '晚餐/通勤');
            fill(tpl.workday, 20, 21.5, 'STUDY', '自我提升/阅读'); fill(tpl.workday, 21.5, 23.5, 'ENTERTAINMENT', '放松娱乐');
            fill(tpl.workday, 23.5, 24, 'SLEEP', '准备入睡');

            fill(tpl.weekend, 0, 9, 'SLEEP', '周末补觉'); fill(tpl.weekend, 9, 10, 'REST', '早午餐');
            fill(tpl.weekend, 10, 12, 'ENTERTAINMENT', '放松/游戏'); fill(tpl.weekend, 14, 16, 'WORKOUT', '健身房/户外运动');
            fill(tpl.weekend, 16, 18, 'STUDY', '兴趣探索'); fill(tpl.weekend, 19, 23, 'ENTERTAINMENT', '看电影/聚会');
            fill(tpl.weekend, 23.5, 24, 'SLEEP', '准备入睡');
            return tpl;
        };

        const getInitialTemplates = () => {
            try {
                const saved = localStorage.getItem('day-tracker-templates');
                return saved ? JSON.parse(saved) : getDefaultTemplates();
            } catch(e) { return getDefaultTemplates(); }
        };

        // ==========================================
        // ⚠️ [重要配置] 请在此处填入你的 Google API 凭证
        // 申请地址: https://console.cloud.google.com/
        // ==========================================
        const GOOGLE_CLIENT_ID = '754063048874-mar7krk10jaocle3h4jikr0km257ujpi.apps.googleusercontent.com'; // 替换为你的 OAuth Client ID
        const GOOGLE_API_KEY = 'AIzaSyCZ9Z8-Hze3ebPjUloySCsRiniOno7-XmM'; // ⚠️ 请替换为你的 API Key (务必以 AIza 开头)
        const GOOGLE_DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata'; // 使用隐蔽的 appData 空间存储

        function App() {
            const todayStr = useMemo(() => formatDate(new Date()), []);
            const [currentDateStr, setCurrentDateStr] = useState(todayStr);
            const [calendarMonth, setCalendarMonth] = useState(new Date());

            const [slots, setSlots] = useState(() => getInitialSlots(todayStr));
            const [categories, setCategories] = useState(getInitialCategories);
            const [templates, setTemplates] = useState(getInitialTemplates);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // 侧边栏拖拽宽度状态
            const [sidebarWidth, setSidebarWidth] = useState(320);
            const isResizingRef = useRef(false);
            
            // 折叠面板状态（要求今日分析默认展开，其他折叠收起）
            const [isCalendarOpen, setIsCalendarOpen] = useState(false);
            const [isStatsOpen, setIsStatsOpen] = useState(true);
            const [isTemplatesOpen, setIsTemplatesOpen] = useState(false);
            const [isStorageOpen, setIsStorageOpen] = useState(false);
            const [expandedStatCategory, setExpandedStatCategory] = useState(null);

            const [dialog, setDialog] = useState({ isOpen: false, title: '', message: '', type: 'warning', onConfirm: null });
            const [editingGroupId, setEditingGroupId] = useState(null);
            const [editValue, setEditValue] = useState('');
            
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState(null);
            const [dragCurrent, setDragCurrent] = useState(null);
            
            const [modalOpen, setModalOpen] = useState(false);
            const [modalData, setModalData] = useState({ start: 0, end: 0, activity: '', categoryId: null });
            const [editingCatId, setEditingCatId] = useState(null);
            const [catEditName, setCatEditName] = useState('');
            const [catEditColor, setCatEditColor] = useState(null);
            const [catEditIcon, setCatEditIcon] = useState(null);
            const [draggedCatId, setDraggedCatId] = useState(null);

            // --- 新增: Google Drive 同步与冲突控制状态 ---
            const [isGoogleSignedIn, setIsGoogleSignedIn] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [autoSync, setAutoSync] = useState(() => localStorage.getItem('day-tracker-autosync') === 'true');
            const [syncTime, setSyncTime] = useState(() => localStorage.getItem('day-tracker-synctime') || '尚未同步');
            const [conflictModal, setConflictModal] = useState({ isOpen: false, localTime: null, cloudTime: null, cloudData: null, fileId: null });
            
            const tokenClientRef = useRef(null);
            const isInitialMount = useRef(true);

            const containerRef = useRef(null);

            // === Google API 与 GIS 服务初始化 ===
            useEffect(() => {
                let attempts = 0;
                const initGoogle = () => {
                    // 增强安全校验：拦截未配置或格式错误的 API 密钥 (真实的 API Key 必定以 AIza 开头)
                    if (!GOOGLE_API_KEY.startsWith('AIza') || GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
                        console.warn('【云同步已禁用】请在代码中配置有效的 GOOGLE_CLIENT_ID 和 GOOGLE_API_KEY (必须以 AIza 开头)。');
                        return;
                    }

                    if (window.gapi && window.google) {
                        gapi.load('client', async () => {
                            try {
                                await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: [GOOGLE_DISCOVERY_DOC] });
                                tokenClientRef.current = google.accounts.oauth2.initTokenClient({
                                    client_id: GOOGLE_CLIENT_ID,
                                    scope: GOOGLE_SCOPES,
                                    callback: (tokenResponse) => {
                                        if (tokenResponse && tokenResponse.access_token) {
                                            setIsGoogleSignedIn(true);
                                            setTimeout(() => handleManualSync(false, tokenResponse.access_token), 500); // 登录成功后自动触发一次比对
                                        }
                                    },
                                });
                            } catch (err) { console.error('Google API 初始化失败', err); }
                        });
                    } else if (attempts < 20) {
                        attempts++;
                        setTimeout(initGoogle, 500);
                    }
                };
                initGoogle();
            }, []);

            // === 保存数据绑定 (加入自动打时间戳机制) ===
            useEffect(() => { 
                localStorage.setItem(`day-tracker-slots-${currentDateStr}`, JSON.stringify(slots)); 
                localStorage.setItem('day-tracker-last-modified', Date.now().toString());
            }, [slots, currentDateStr]);
            
            useEffect(() => { 
                localStorage.setItem('day-tracker-categories', JSON.stringify(categories)); 
                localStorage.setItem('day-tracker-last-modified', Date.now().toString());
            }, [categories]);
            
            useEffect(() => { 
                localStorage.setItem('day-tracker-templates', JSON.stringify(templates)); 
                localStorage.setItem('day-tracker-last-modified', Date.now().toString());
            }, [templates]);

            // === Google Drive 同步核心逻辑 ===
            const getLocalData = () => {
                const data = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('day-tracker-') && !key.includes('autosync') && !key.includes('synctime')) {
                        data[key] = localStorage.getItem(key);
                    }
                }
                return data;
            };

            const getLocalTimestamp = () => parseInt(localStorage.getItem('day-tracker-last-modified') || '0', 10);

            const executeDriveUpload = async (fileId, data, timestamp) => {
                const fileContent = JSON.stringify({ data, timestamp });
                const file = new Blob([fileContent], { type: 'application/json' });
                const metadata = { name: 'day-tracker-backup.json', parents: ['appDataFolder'] };

                let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
                let method = 'POST';
                if (fileId) {
                    url = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`;
                    method = 'PATCH';
                }

                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const res = await fetch(url, {
                    method: method,
                    headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token },
                    body: form
                });
                
                if (res.ok) {
                    const nowStr = new Date().toLocaleString();
                    setSyncTime(nowStr);
                    localStorage.setItem('day-tracker-synctime', nowStr);
                } else { throw new Error('上传云端失败'); }
            };

            const handleManualSync = async (isBackground = false, optionalToken = null) => {
                setIsSyncing(true);
                try {
                    const token = optionalToken || gapi.client.getToken()?.access_token;
                    if (!token) throw new Error("未获取到登录令牌");

                    const resList = await gapi.client.drive.files.list({
                        spaces: 'appDataFolder',
                        fields: 'files(id, name, modifiedTime)',
                        q: "name='day-tracker-backup.json'",
                        pageSize: 1
                    });
                    const files = resList.result.files;
                    const localTime = getLocalTimestamp();
                    
                    if (files && files.length > 0) {
                        const fileInfo = files[0];
                        const resGet = await gapi.client.drive.files.get({ fileId: fileInfo.id, alt: 'media' });
                        let cloudContent = resGet.result;
                        if (typeof cloudContent === 'string') cloudContent = JSON.parse(cloudContent);
                        
                        const cloudTime = cloudContent.timestamp || 0;
                        if (cloudTime === localTime) { setIsSyncing(false); return; } // 数据完全同步
                        
                        if (cloudTime > localTime) {
                            // 发生冲突：检测到云端更新了版本
                            setConflictModal({ isOpen: true, localTime, cloudTime, cloudData: cloudContent.data, fileId: fileInfo.id });
                            setIsSyncing(false);
                            return;
                        } else {
                            // 本地更新：静默上传覆盖云端
                            await executeDriveUpload(fileInfo.id, getLocalData(), localTime);
                        }
                    } else {
                        // 首次同步：新建文件
                        await executeDriveUpload(null, getLocalData(), localTime);
                    }
                } catch(e) {
                    console.error("同步异常:", e);
                    if (!isBackground) openConfirm('同步失败', '无法连接到 Google Drive，请检查网络或确认已正确配置 API 凭证。', closeConfirm, 'warning');
                }
                setIsSyncing(false);
            };

            const resolveConflict = (action) => {
                if (action === 'cloud') {
                    // 应用云端数据并刷新
                    if (conflictModal.cloudData) {
                        for (const key in conflictModal.cloudData) {
                            if (key.startsWith('day-tracker-')) {
                                localStorage.setItem(key, conflictModal.cloudData[key]);
                            }
                        }
                        localStorage.setItem('day-tracker-synctime', new Date().toLocaleString());
                        window.location.reload();
                    }
                } else if (action === 'local') {
                    // 强制覆盖云端数据
                    executeDriveUpload(conflictModal.fileId, getLocalData(), getLocalTimestamp());
                    setConflictModal({ ...conflictModal, isOpen: false });
                }
            };

            const handleGoogleLogin = () => {
                // 增强登录时的校验与提示
                if (!GOOGLE_API_KEY.startsWith('AIza') || GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
                    openConfirm(
                        '需要配置有效的 Google 凭证',
                        '由于 Google 的安全机制限制，网页无法“自动”获取接入密钥，必须由您手动申请。\n\n快速申请步骤：\n1. 访问 console.cloud.google.com 登录\n2. 创建新项目，并在API库中搜索并启用 "Google Drive API"\n3. 进入"凭证"菜单，创建 "API 密钥" (注意：是以 AIza 开头的字符串)\n4. 再次创建 "OAuth 客户端 ID" (Web应用类型)\n5. 将获取到的这两个字符串，复制替换到代码第 135 行的配置区。\n\n完成配置后，再次点击此按钮即可顺利弹出登录窗口！', 
                        closeConfirm, 
                        'info'
                    );
                    return;
                }
                if (tokenClientRef.current) {
                    tokenClientRef.current.requestAccessToken();
                } else {
                    openConfirm('服务未就绪', 'Google 服务仍在加载或您的网络无法访问 Google 服务器，请稍后再试。', closeConfirm, 'warning');
                }
            };

            // === 自动同步监听机制 ===
            useEffect(() => {
                if (isInitialMount.current) { isInitialMount.current = false; return; }
                if (!isGoogleSignedIn || !autoSync) return;
                
                // 监听数据变化，防抖 8 秒后静默上传
                const timer = setTimeout(() => handleManualSync(true), 8000); 
                return () => clearTimeout(timer);
            }, [slots, categories, templates, autoSync, isGoogleSignedIn]);

            // 侧边栏宽度拖拽调整逻辑
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isResizingRef.current) return;
                    let newWidth = e.clientX;
                    if (newWidth < 260) newWidth = 260; // 限制最小宽度
                    if (newWidth > window.innerWidth * 0.6) newWidth = window.innerWidth * 0.6; // 限制最大宽度为屏幕宽度的60%
                    setSidebarWidth(newWidth);
                };
                const handleMouseUp = () => {
                    if (isResizingRef.current) {
                        isResizingRef.current = false;
                        document.body.style.cursor = 'default';
                        document.body.style.userSelect = 'auto'; // 恢复文本选择
                    }
                };
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            const exportData = () => {
                try {
                    const data = {};
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && key.startsWith('day-tracker-')) data[key] = localStorage.getItem(key);
                    }
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `day-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (e) {
                    openConfirm('导出失败', '无法读取本地数据。', closeConfirm, 'warning');
                }
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        let count = 0;
                        for (const key in data) {
                            if (key.startsWith('day-tracker-')) {
                                localStorage.setItem(key, data[key]);
                                count++;
                            }
                        }
                        openConfirm('恢复成功', `成功读取 ${count} 项备份数据，页面将刷新以应用。`, () => window.location.reload(), 'info');
                    } catch (error) {
                        openConfirm('恢复失败', '文件格式不正确，请确保是系统导出的 .json 备份文件。', closeConfirm, 'warning');
                    }
                };
                reader.readAsText(file);
                event.target.value = ''; 
            };

            const slotHeights = useMemo(() => {
                const heights = new Array(TOTAL_SLOTS).fill(SLOT_HEIGHT);
                for (let i = 0; i < TOTAL_SLOTS; i++) {
                    const slot = slots[i];
                    if (slot && slot.categoryId === 'SLEEP' && slot.groupId) {
                        let startIdx = i;
                        while (startIdx > 0 && slots[startIdx - 1]?.groupId === slot.groupId) startIdx--;
                        let endIdx = startIdx;
                        while (endIdx + 1 < TOTAL_SLOTS && slots[endIdx + 1]?.groupId === slot.groupId) endIdx++;
                        if ((endIdx - startIdx + 1) > 2) { 
                            if (i > startIdx) { heights[i] = 0; } else { heights[i] = COLLAPSED_SLEEP_HEIGHT; }
                        }
                    }
                }
                return heights;
            }, [slots]);

            const slotTops = useMemo(() => {
                const tops = new Array(TOTAL_SLOTS).fill(0);
                let currentTop = 0;
                for (let i = 0; i < TOTAL_SLOTS; i++) { tops[i] = currentTop; currentTop += slotHeights[i]; }
                return tops;
            }, [slotHeights]);

            const indicatorTop = useMemo(() => {
                const currentMinutesTotal = currentTime.getHours() * 60 + currentTime.getMinutes();
                const idx = Math.floor(currentMinutesTotal / 30);
                const remainder = currentMinutesTotal % 30;
                if (idx >= TOTAL_SLOTS) return slotTops[TOTAL_SLOTS - 1] + slotHeights[TOTAL_SLOTS - 1];

                if (slotHeights[idx] === 0) {
                    let headerIdx = idx;
                    while (headerIdx > 0 && slotHeights[headerIdx] === 0) headerIdx--;
                    let groupSpan = 1;
                    let tempIdx = headerIdx + 1;
                    while (tempIdx < TOTAL_SLOTS && slots[tempIdx]?.groupId === slots[headerIdx]?.groupId) { groupSpan++; tempIdx++; }
                    return slotTops[headerIdx] + (((idx - headerIdx) * 30 + remainder) / (groupSpan * 30)) * slotHeights[headerIdx];
                } else {
                    return slotTops[idx] + (remainder / 30) * slotHeights[idx];
                }
            }, [currentTime, slotTops, slotHeights, slots]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000); 
                setTimeout(() => {
                    if (containerRef.current && slotTops.length > 0) {
                        const scrollPos = slotTops[currentTime.getHours() * 2] - (SLOT_HEIGHT * 2);
                        containerRef.current.scrollTop = scrollPos > 0 ? scrollPos : 0;
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            const openConfirm = (title, message, onConfirm, type='warning') => setDialog({ isOpen: true, title, message, onConfirm, type });
            const closeConfirm = () => setDialog({ ...dialog, isOpen: false });

            const handleMouseDown = (index, e) => {
                if (e.button !== 0 || editingGroupId !== null) return; 
                setIsDragging(true); setDragStart(index); setDragCurrent(index);
            };
            const handleMouseUp = () => {
                if (!isDragging) return;
                setIsDragging(false);
                const sortedCats = Object.values(categories).sort((a, b) => (a.order || 0) - (b.order || 0));
                setModalData({ start: Math.min(dragStart, dragCurrent), end: Math.max(dragStart, dragCurrent), activity: '', categoryId: sortedCats.length > 0 ? sortedCats[0].id : null });
                setModalOpen(true);
            };

            useEffect(() => {
                const handleGlobalMouseUp = () => { if (isDragging) handleMouseUp(); };
                window.addEventListener('mouseup', handleGlobalMouseUp);
                return () => window.removeEventListener('mouseup', handleGlobalMouseUp);
            }, [isDragging, dragStart, dragCurrent, categories]);

            const saveBlock = () => {
                if (!modalData.categoryId) return;
                const newSlots = [...slots];
                const groupId = Date.now().toString(); 
                for (let i = modalData.start; i <= modalData.end; i++) {
                    newSlots[i] = { activity: modalData.activity || categories[modalData.categoryId]?.label || '未命名', categoryId: modalData.categoryId, status: 'in-progress', groupId: groupId };
                }
                setSlots(newSlots);
                setModalOpen(false);
            };

            const updateBlockActivity = (groupId, newActivity) => {
                setSlots(slots.map(s => s.groupId === groupId ? { ...s, activity: newActivity || categories[s.categoryId]?.label || '' } : s));
                setEditingGroupId(null);
            };

            const deleteBlock = (groupId) => setSlots(slots.map(s => s?.groupId === groupId ? { activity: '', categoryId: null, status: 'none', groupId: null } : s));
            const toggleStatus = (groupId) => setSlots(slots.map(s => s?.groupId === groupId ? { ...s, status: s.status === 'done' ? 'in-progress' : 'done' } : s));

            const applyTemplate = (type) => {
                const tplName = type === 'workday' ? '工作日' : '周末';
                openConfirm('覆盖当前记录', `确定要清空今天的面板，并加载【${tplName}】模板吗？`, () => {
                    const sourceTpl = templates[type] || getEmptySlots();
                    const idMap = {};
                    setSlots(sourceTpl.map(s => {
                        if (!s || !s.categoryId) return { activity: '', categoryId: null, status: 'none', groupId: null };
                        if (!idMap[s.groupId]) idMap[s.groupId] = 'tpl_' + Date.now() + Math.random();
                        return { ...s, groupId: idMap[s.groupId], status: 'in-progress' };
                    }));
                    closeConfirm();
                }, 'info');
            };

            const saveToTemplate = (type) => {
                const tplName = type === 'workday' ? '工作日' : '周末';
                openConfirm('保存为模板', `确定将当前的完整时间表，保存为【${tplName}】模板吗？`, () => {
                    setTemplates({ ...templates, [type]: JSON.parse(JSON.stringify(slots)) });
                    closeConfirm();
                }, 'info');
            };

            const addCategory = () => {
                const newId = 'CAT_' + Date.now();
                const randColor = PRESET_COLORS[Math.floor(Math.random() * PRESET_COLORS.length)];
                const randIcon = PRESET_ICONS[Math.floor(Math.random() * PRESET_ICONS.length)];
                const maxOrder = Math.max(...Object.values(categories).map(c => c.order || 0), -1);
                
                setCategories({ ...categories, [newId]: { id: newId, label: '新类别', ...randColor, icon: randIcon, order: maxOrder + 1 } });
                setEditingCatId(newId); setCatEditName('新类别'); setCatEditColor(randColor); setCatEditIcon(randIcon);
            };

            const saveCategoryName = (id) => {
                if (!catEditName.trim()) return;
                setCategories({ ...categories, [id]: { ...categories[id], label: catEditName, ...(catEditColor ? catEditColor : {}), icon: catEditIcon || categories[id].icon } });
                setEditingCatId(null); setCatEditColor(null); setCatEditIcon(null);
            };

            const requestDeleteCategory = (id) => {
                if (Object.keys(categories).length <= 1) { openConfirm('无法删除', '至少需要保留一个类别。', closeConfirm, 'info'); return; }
                openConfirm('删除类别', `确定要删除类别 "${categories[id].label}" 吗？这会将时间轴上使用了此块的类别重置为空。`, () => {
                    const newCats = { ...categories }; delete newCats[id]; setCategories(newCats);
                    setSlots(slots.map(s => s.categoryId === id ? { activity: '', categoryId: null, status: 'none', groupId: null } : s));
                    if (modalData.categoryId === id) {
                        const remainCats = Object.values(newCats).sort((a,b)=> (a.order||0)-(b.order||0));
                        setModalData({...modalData, categoryId: remainCats.length > 0 ? remainCats[0].id : null});
                    }
                    closeConfirm();
                });
            };

            const sortedCategories = useMemo(() => Object.values(categories).sort((a, b) => (a.order || 0) - (b.order || 0)), [categories]);

            const changeDate = (d) => {
                const newStr = formatDate(d);
                if (newStr !== currentDateStr) { setCurrentDateStr(newStr); setSlots(getInitialSlots(newStr)); }
            };

            const changeDayOffset = (offset) => {
                if (!currentDateStr) return;
                const [y, m, d] = currentDateStr.split('-');
                const dateObj = new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
                dateObj.setDate(dateObj.getDate() + offset);
                changeDate(dateObj);
                // 切换日期时，同步更新展开面板里的日历月份，避免视觉脱节
                setCalendarMonth(new Date(dateObj.getFullYear(), dateObj.getMonth(), 1)); 
            };

            const renderCalendarDays = () => {
                const year = calendarMonth.getFullYear(), month = calendarMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate(), firstDay = new Date(year, month, 1).getDay();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="text-center text-xs text-transparent py-1">0</div>);
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateObj = new Date(year, month, i);
                    const dateStr = formatDate(dateObj);
                    const isSelected = dateStr === currentDateStr, isToday = dateStr === formatDate(new Date());
                    
                    const hasData = dateStr === currentDateStr 
                        ? slots.some(s => s && s.categoryId !== null)
                        : hasDataForDate(dateStr);

                    days.push(
                        <button key={dateStr} onClick={() => changeDate(dateObj)}
                            className={`relative text-center text-xs py-1 rounded-full w-7 h-7 flex items-center justify-center mx-auto transition-colors
                                ${isSelected ? 'bg-blue-500 text-white font-bold shadow-md' : isToday ? 'bg-blue-50 text-blue-600 font-bold border border-blue-200' : 'text-slate-600 hover:bg-slate-100'}
                            `}>
                            <span className="mb-0.5">{i}</span>
                            {hasData && (
                                <span className={`absolute bottom-[3px] left-1/2 -translate-x-1/2 w-1 h-1 rounded-full ${isSelected ? 'bg-white' : 'bg-blue-400'}`}></span>
                            )}
                        </button>
                    );
                }
                return days;
            };

            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedCatId || draggedCatId === targetId) return;
                const sorted = [...sortedCategories];
                const draggedIndex = sorted.findIndex(c => c.id === draggedCatId), targetIndex = sorted.findIndex(c => c.id === targetId);
                const draggedCat = sorted.splice(draggedIndex, 1)[0];
                sorted.splice(targetIndex, 0, draggedCat);
                const newCats = { ...categories };
                sorted.forEach((cat, index) => { newCats[cat.id] = { ...cat, order: index }; });
                setCategories(newCats); setDraggedCatId(null);
            };

            const groupedBlocks = useMemo(() => {
                const blocks = []; let currentBlock = null;
                for (let i = 0; i < TOTAL_SLOTS; i++) {
                    const slot = slots[i];
                    if (!slot || !slot.groupId) { if (currentBlock) blocks.push(currentBlock); currentBlock = null; continue; }
                    if (!currentBlock || currentBlock.groupId !== slot.groupId) {
                        if (currentBlock) blocks.push(currentBlock);
                        currentBlock = { ...slot, startIndex: i, span: 1 };
                    } else currentBlock.span += 1;
                }
                if (currentBlock) blocks.push(currentBlock);
                return blocks;
            }, [slots]);

            const stats = useMemo(() => {
                const counts = {}; Object.keys(categories).forEach(k => counts[k] = 0);
                let totalTracked = 0;
                let productive = 0;
                
                (slots || []).forEach(s => { 
                    if (s && s.categoryId && categories[s.categoryId]) { 
                        counts[s.categoryId] += 0.5; 
                        totalTracked += 0.5; 
                    } 
                });
                
                // 智能识别：无论是原生ID，还是名称中包含“工作/学习”的自定义类别，统统精准计入核心专注时间
                Object.keys(counts).forEach(catId => {
                    const label = categories[catId]?.label || '';
                    if (catId === 'WORK' || catId === 'STUDY' || label.includes('工作') || label.includes('学习')) {
                        productive += counts[catId];
                    }
                });

                return { counts, totalTracked, productive };
            }, [slots, categories]);

            const sortedStatsCategories = useMemo(() => {
                return Object.values(categories).sort((a, b) => (stats.counts[b.id] || 0) - (stats.counts[a.id] || 0));
            }, [categories, stats]);

            const displayDateTitle = useMemo(() => {
                if (!currentDateStr) return '';
                const [y, m, d] = currentDateStr.split('-');
                return `${y}年 ${parseInt(m, 10)}月 ${parseInt(d, 10)}日`;
            }, [currentDateStr]);

            const getCategoryActivities = (catId) => {
                const acts = {};
                (slots || []).forEach(s => {
                    if (s && s.categoryId === catId) {
                        const name = s.activity || categories[catId]?.label || '未命名';
                        acts[name] = (acts[name] || 0) + 0.5;
                    }
                });
                return Object.entries(acts).map(([name, hours]) => ({ name, hours })).sort((a, b) => b.hours - a.hours);
            };

            let dragHighlightTop = 0, dragHighlightHeight = 0, dStart = 0, dEnd = 0;
            if (isDragging && dragStart !== null && dragCurrent !== null) {
                dStart = Math.min(dragStart, dragCurrent); dEnd = Math.max(dragStart, dragCurrent);
                dragHighlightTop = slotTops[dStart] || 0;
                for (let i = dStart; i <= dEnd; i++) dragHighlightHeight += (slotHeights[i] || 0);
            }

            return (
                <div className="h-screen overflow-hidden flex flex-col md:flex-row bg-slate-50 text-slate-800 font-sans">
                    
                    {/* Left Sidebar Fixed / Flex constraints */}
                    <div 
                        className="w-full shrink-0 flex flex-col h-full bg-slate-50 border-r border-slate-200 z-10 relative dynamic-sidebar"
                        style={{ '--sidebar-width': `${sidebarWidth}px` }}
                    >
                        {/* 侧边栏宽度拖拽把手 (仅桌面端生效) */}
                        <div 
                            className="hidden md:block absolute top-0 -right-1.5 w-3 h-full cursor-col-resize z-50 hover:bg-blue-500/20 active:bg-blue-500/40 transition-colors"
                            onMouseDown={() => {
                                isResizingRef.current = true;
                                document.body.style.cursor = 'col-resize';
                                document.body.style.userSelect = 'none'; // 防止拖拽时误选中文本
                            }}
                        ></div>

                        <div className="p-5 pb-2 shrink-0">
                            <h1 className="text-2xl font-bold flex items-center gap-2 mb-1"><Icon name="Clock" className="text-blue-600" /> Day Tracker</h1>
                            <p className="text-slate-500 text-xs">30分钟刻度时间管理法</p>
                        </div>

                        {/* Scrollable Center Content */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-2.5 p-3 pt-1">
                            {/* Calendar Accordion */}
                            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm shrink-0">
                                <div onClick={() => setIsCalendarOpen(!isCalendarOpen)} className="w-full relative flex items-center justify-center py-2 px-4 bg-white hover:bg-slate-50 transition-colors cursor-pointer select-none">
                                    <div className="absolute left-4">
                                        <Icon name="Calendar" size={14} className="text-indigo-500"/>
                                    </div>
                                    <div className="flex items-center gap-0.5">
                                        <button onClick={(e) => { e.stopPropagation(); changeDayOffset(-1); }} className="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors" title="前一天"><Icon name="ChevronLeft" size={14}/></button>
                                        <h2 className="text-xs font-bold text-slate-700 w-28 text-center tracking-tight">{displayDateTitle}</h2>
                                        <button onClick={(e) => { e.stopPropagation(); changeDayOffset(1); }} className="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors" title="后一天"><Icon name="ChevronRight" size={14}/></button>
                                    </div>
                                    <div className="absolute right-4">
                                        <Icon name={isCalendarOpen ? "ChevronDown" : "ChevronRight"} size={14} className="text-slate-400" />
                                    </div>
                                </div>
                                {isCalendarOpen && (
                                    <div className="p-4 pt-0 border-t border-slate-100 bg-white">
                                        <div className="flex items-center justify-between mb-3 mt-2">
                                            <button onClick={()=>setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1))} className="p-1 hover:bg-slate-100 rounded text-slate-500"><Icon name="ChevronLeft" size={14}/></button>
                                            <span className="text-xs font-bold text-slate-700">{calendarMonth.getFullYear()}年 {calendarMonth.getMonth() + 1}月</span>
                                            <button onClick={()=>setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1))} className="p-1 hover:bg-slate-100 rounded text-slate-500"><Icon name="ChevronRight" size={14}/></button>
                                        </div>
                                        <div className="grid grid-cols-7 gap-1 mb-1">
                                            {['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-center text-[10px] font-bold text-slate-400">{d}</div>)}
                                        </div>
                                        <div className="grid grid-cols-7 gap-1">{renderCalendarDays()}</div>
                                        {currentDateStr !== formatDate(new Date()) && (
                                            <button onClick={() => changeDate(new Date())} className="w-full mt-3 text-indigo-500 hover:text-indigo-600 hover:bg-indigo-50 text-[11px] py-1.5 rounded-lg border border-indigo-100">返回今天</button>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Stats Accordion */}
                            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm shrink-0">
                                <button onClick={() => setIsStatsOpen(!isStatsOpen)} className="w-full flex items-center justify-between p-3 px-4 bg-white hover:bg-slate-50 transition-colors">
                                    <h2 className="text-xs font-bold text-slate-700 flex items-center gap-2"><Icon name="PieChart" size={14} className="text-blue-500"/> 今日分析</h2>
                                    <Icon name={isStatsOpen ? "ChevronDown" : "ChevronRight"} size={14} className="text-slate-400" />
                                </button>
                                {isStatsOpen && (
                                    <div className="p-3 pt-0 border-t border-slate-100 bg-white">
                                        {/* 优化后的核心专注时间横向紧凑卡片 */}
                                        <div className="bg-slate-50 p-2.5 rounded-lg border border-slate-200 mb-3 mt-2 flex items-center justify-between shadow-[0_1px_2px_rgba(0,0,0,0.02)]">
                                            <div className="flex flex-col pl-1">
                                                <span className="text-[11px] text-slate-500 font-medium mb-0.5">核心专注时间</span>
                                                <div className="text-xl font-bold text-slate-800 flex items-baseline gap-0.5">
                                                    {stats.productive} <span className="text-xs font-normal text-slate-500">h</span>
                                                </div>
                                            </div>
                                            <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shrink-0 shadow-inner">
                                                <Icon name="Laptop" size={14} />
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-0.5">
                                            {sortedStatsCategories.map(cat => {
                                                const hours = stats.counts[cat.id] || 0;
                                                if (hours === 0) return null;
                                                const isExpanded = expandedStatCategory === cat.id;
                                                return (
                                                    <div key={cat.id} className="border border-transparent hover:border-slate-100 rounded-lg overflow-hidden">
                                                        <div onClick={() => setExpandedStatCategory(isExpanded ? null : cat.id)} className="flex items-center justify-between p-1.5 px-2 cursor-pointer hover:bg-slate-50 rounded-lg group transition-colors">
                                                            <div className="flex items-center gap-2 flex-1 min-w-0">
                                                                <span className={`w-2.5 h-2.5 rounded-full shrink-0 ${cat.color}`}></span>
                                                                <span className="text-slate-700 text-xs font-medium truncate">{cat.label}</span>
                                                            </div>
                                                            <div className="flex items-center gap-2 shrink-0">
                                                                <span className="text-xs font-bold text-slate-600">{hours}h</span>
                                                                <div className="w-10 h-1.5 bg-slate-100 rounded-full overflow-hidden hidden sm:block">
                                                                    <div className={`h-full ${cat.color}`} style={{ width: `${(hours / stats.totalTracked) * 100}%` }}></div>
                                                                </div>
                                                                <Icon name="ChevronDown" size={14} className={`text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''} group-hover:text-blue-500`}/>
                                                            </div>
                                                        </div>
                                                        {isExpanded && (
                                                            <div className="pl-6 pr-2 pb-1.5 pt-0.5 space-y-1 animate-slide-down">
                                                                {getCategoryActivities(cat.id).map((act, idx) => (
                                                                    <div key={idx} className="flex justify-between items-center text-[11px] text-slate-500 bg-slate-50 px-2 py-1 rounded border border-slate-100">
                                                                        <span className="truncate pr-2 font-medium before:content-['-'] before:mr-1 before:text-slate-300">{act.name}</span>
                                                                        <span className="shrink-0">{act.hours}h</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Fixed Bottom Controls */}
                        <div className="shrink-0 p-3 flex flex-col gap-2 border-t border-slate-200 bg-slate-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)]">
                            <div className="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                                <button onClick={() => setIsStorageOpen(!isStorageOpen)} className="w-full flex items-center justify-between p-2 px-3 bg-white hover:bg-slate-50 transition-colors">
                                    <h2 className="text-[11px] font-bold text-slate-700 flex items-center gap-1.5"><Icon name="Save" size={12} className="text-green-500"/> 存储与备份<span className="text-[9px] font-normal text-green-600 bg-green-100 px-1 py-0.5 rounded ml-1 hidden lg:inline">已自动保存</span></h2>
                                    <Icon name={isStorageOpen ? "ChevronDown" : "ChevronRight"} size={12} className="text-slate-400" />
                                </button>
                                {isStorageOpen && (
                                    <div className="p-3 pt-0 border-t border-slate-100 bg-white flex flex-col gap-1.5 mt-1.5">
                                        
                                        {/* 新增: Google Drive 云同步模块 */}
                                        <div className="bg-blue-50/50 p-2 rounded-lg border border-blue-100 flex flex-col gap-1.5">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-1">
                                                    <Icon name="Cloud" size={14} className={isGoogleSignedIn ? "text-blue-500" : "text-slate-400"}/>
                                                    <span className="text-[11px] font-bold text-slate-700">云同步</span>
                                                </div>
                                                {!isGoogleSignedIn ? (
                                                    <button onClick={handleGoogleLogin} className="text-[10px] bg-white border border-blue-200 text-blue-600 px-2 py-0.5 rounded shadow-sm hover:bg-blue-50 transition-colors">绑定 Google</button>
                                                ) : (
                                                    <div className="flex items-center gap-2">
                                                        <label className="flex items-center gap-1 text-[10px] text-slate-600 cursor-pointer">
                                                            <input type="checkbox" checked={autoSync} onChange={(e) => { setAutoSync(e.target.checked); localStorage.setItem('day-tracker-autosync', e.target.checked); }} className="accent-blue-500"/>
                                                            自动
                                                        </label>
                                                        <button onClick={()=>handleManualSync(false)} disabled={isSyncing} className="text-[10px] bg-white border border-blue-200 text-blue-600 px-2 py-0.5 rounded shadow-sm hover:bg-blue-50 flex items-center gap-1 disabled:opacity-50 transition-colors">
                                                            {isSyncing ? <Icon name="RefreshCw" size={10} className="animate-spin"/> : null}
                                                            手动
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                            {isGoogleSignedIn && (
                                                <div className="text-[9px] text-slate-400 text-right pr-1">上次同步: {syncTime}</div>
                                            )}
                                        </div>

                                        <div className="flex gap-1.5 mt-0.5">
                                            <button onClick={exportData} className="flex-1 bg-white hover:bg-slate-50 text-slate-700 py-1.5 rounded text-[10px] font-medium transition-colors border border-slate-200 shadow-sm flex items-center justify-center gap-1"><Icon name="Download" size={12}/> 本地导出</button>
                                            <label className="flex-1 bg-white hover:bg-slate-50 text-slate-700 py-1.5 rounded text-[10px] font-medium transition-colors border border-slate-200 shadow-sm flex items-center justify-center gap-1 cursor-pointer"><Icon name="Upload" size={12}/> 本地导入<input type="file" accept=".json" className="hidden" onChange={importData} /></label>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Right Timeline View */}
                    <div className="flex-1 bg-white flex flex-col h-full overflow-hidden">
                        <div className="flex border-b border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-500 shadow-sm z-10 shrink-0">
                            <div className="w-16 text-center">时间</div>
                            <div className="flex-1 pl-4">任务安排 <span className="text-xs font-normal text-slate-400 ml-2 hidden sm:inline">(拖拽框选新建，点击内容直编)</span></div>
                            <div className="w-20 text-center">状态</div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 relative" ref={containerRef}>
                            <div className="max-w-4xl mx-auto bg-white rounded-xl border border-slate-200 shadow-sm relative overflow-hidden select-none">
                                
                                {Array.from({ length: TOTAL_SLOTS }).map((_, index) => {
                                    const h = slotHeights[index];
                                    if (h === 0) return null; 
                                    const isCollapsedSleep = h === COLLAPSED_SLEEP_HEIGHT && slots[index]?.categoryId === 'SLEEP';

                                    return (
                                        <div key={index} className={`flex group transition-colors relative ${index % 2 === 0 ? 'border-t border-slate-200' : 'border-t border-slate-100 border-dashed'} ${index===0?'border-t-0':''}`} style={{ height: `${h}px` }} onMouseDown={(e) => handleMouseDown(index, e)} onMouseEnter={() => {if(isDragging) setDragCurrent(index)}}>
                                            <div className="shrink-0 w-16 border-r border-slate-100 relative">
                                                {!isCollapsedSleep ? (
                                                    <div className="absolute right-3 top-0 -translate-y-1/2 bg-white px-1 text-[11px] font-semibold text-slate-500 z-10">{getTimeLabel(index)}</div>
                                                ) : (
                                                    <>
                                                        <div className="absolute right-3 top-2 bg-white px-1 text-[11px] font-semibold text-slate-600 z-10">{getTimeLabel(index)}</div>
                                                        <div className="absolute right-3 bottom-2 bg-white px-1 text-[11px] font-semibold text-slate-600 z-10">
                                                            {(() => { let endIdx = index; while (endIdx + 1 < TOTAL_SLOTS && slots[endIdx + 1]?.groupId === slots[index]?.groupId) endIdx++; return getTimeLabel(endIdx + 1); })()}
                                                        </div>
                                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 text-[10px]">至</div>
                                                    </>
                                                )}
                                            </div>
                                            <div className={`flex-1 ${isDragging ? 'cursor-ns-resize' : 'cursor-pointer'} hover:bg-blue-50/30 transition-colors`}></div>
                                            <div className="shrink-0 w-20 border-l border-slate-100"></div>
                                        </div>
                                    );
                                })}

                                {isDragging && (
                                    <div className="absolute left-16 right-20 bg-blue-500/20 border-2 border-blue-500 rounded-md pointer-events-none z-20 flex items-center justify-center" style={{ top: `${dragHighlightTop}px`, height: `${dragHighlightHeight}px` }}>
                                        <div className="bg-white/95 text-blue-700 text-xs font-bold px-3 py-1.5 rounded-md shadow-sm border border-blue-200 backdrop-blur-sm">
                                            {getTimeLabel(dStart)} - {getTimeLabel(dEnd + 1)} ({(dEnd - dStart + 1) * 30}m)
                                        </div>
                                    </div>
                                )}

                                {groupedBlocks.map((block) => {
                                    const cat = categories[block.categoryId] || DEFAULT_CATEGORIES.WORK;
                                    const isDone = block.status === 'done', isEditing = editingGroupId === block.groupId;
                                    let blockHeight = 0; for (let i = block.startIndex; i < block.startIndex + block.span; i++) blockHeight += slotHeights[i];
                                    const isCollapsed = block.categoryId === 'SLEEP' && block.span > 2;
                                    
                                    return (
                                        <div key={block.groupId} className="absolute left-16 right-0 flex items-stretch px-1 py-0.5 z-10 transition-all" style={{ top: `${slotTops[block.startIndex]}px`, height: `${blockHeight}px` }}>
                                            <div className={`flex-1 rounded-md shadow-sm border ${cat.color} ${cat.border} flex flex-col justify-center group overflow-hidden ${isDone ? 'opacity-50 grayscale' : 'opacity-95'}`}>
                                                <div className={`flex items-center justify-between px-3 text-white h-full gap-2 ${isCollapsed ? 'py-3' : 'py-1.5'}`}>
                                                    <div className="flex items-center gap-2 font-medium text-sm flex-1 min-w-0">
                                                        <Icon name={cat.icon || 'Star'} size={16} />
                                                        {isEditing ? (
                                                            <div className="flex items-center gap-1.5 flex-1" onMouseDown={e => e.stopPropagation()}>
                                                                <input type="text" autoFocus className="bg-white text-slate-800 text-xs font-normal w-full rounded px-2 py-1 outline-none shadow-inner border border-slate-300" value={editValue} onChange={e => setEditValue(e.target.value)} onBlur={() => updateBlockActivity(block.groupId, editValue)} onKeyDown={e => { if (e.key === 'Enter') { updateBlockActivity(block.groupId, editValue); e.target.blur(); } if (e.key === 'Escape') setEditingGroupId(null); }} />
                                                                <button onMouseDown={e=>{e.preventDefault(); updateBlockActivity(block.groupId, editValue);}} className="bg-white/20 hover:bg-white/40 p-1 rounded"><Icon name="Check" size={14} /></button>
                                                            </div>
                                                        ) : (
                                                            <div className="flex flex-col min-w-0">
                                                                <span className={`truncate text-sm font-semibold ${isDone ? 'line-through opacity-70' : ''}`}>{block.activity}</span>
                                                                {isCollapsed && <span className="text-[10px] text-slate-200 font-normal mt-0.5">💤 睡眠段已折叠 · {block.span * 0.5}小时</span>}
                                                            </div>
                                                        )}
                                                    </div>
                                                    {!isEditing && (
                                                        <div className="opacity-0 group-hover:opacity-100 flex items-center gap-1.5 transition-all" onMouseDown={e => e.stopPropagation()}>
                                                            <button onClick={() => { setEditingGroupId(block.groupId); setEditValue(block.activity); }} className="p-1.5 hover:bg-black/20 rounded" title="编辑内容"><Icon name="Edit2" size={14} /></button>
                                                            <button onClick={() => deleteBlock(block.groupId)} className="p-1.5 hover:bg-black/20 rounded" title="删除区块"><Icon name="Trash2" size={14} /></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="shrink-0 w-20 flex items-center justify-center pointer-events-auto" onMouseDown={e => e.stopPropagation()}>
                                                <button onClick={() => toggleStatus(block.groupId)} className="text-slate-300 hover:text-green-500 transition-colors">
                                                    {isDone ? <Icon name="CheckCircle2" size={24} className="text-green-500 drop-shadow-sm" /> : <Icon name="Circle" size={24} />}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}

                                {currentDateStr === formatDate(currentTime) && (
                                    <div className="absolute left-0 right-20 border-t-2 border-red-500 z-30 pointer-events-none flex items-center transition-all duration-300" style={{ top: `${indicatorTop}px` }}>
                                        <div className="w-2 h-2 rounded-full bg-red-500 -ml-1"></div>
                                        <div className="text-[10px] font-bold text-red-500 bg-white px-1 ml-1 rounded shadow-sm border border-red-200">NOW</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Dialogs and Modals */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden animate-fade-in-zoom p-6">
                                <div className="flex items-center gap-3 mb-4">
                                    <Icon name={dialog.type === 'warning' ? 'AlertTriangle' : dialog.type === 'info' ? 'Cloud' : 'Calendar'} className={dialog.type === 'warning' ? 'text-amber-500' : 'text-blue-500'} size={24}/>
                                    <h3 className="font-bold text-slate-800 text-lg">{dialog.title}</h3>
                                </div>
                                <p className="text-sm text-slate-600 mb-6 leading-relaxed whitespace-pre-wrap">{dialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    {dialog.type === 'warning' && (
                                        <button onClick={closeConfirm} className="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg">取消</button>
                                    )}
                                    <button onClick={dialog.onConfirm} className={`px-5 py-2 text-sm font-medium text-white rounded-lg shadow-sm ${dialog.type === 'warning' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                        {dialog.type === 'info' ? '我知道了' : '确定'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-fade-in-zoom flex flex-col max-h-[90vh]">
                                <div className="p-5 border-b border-slate-100 bg-slate-50 shrink-0">
                                    <h3 className="font-bold text-slate-800 text-lg">新建时间块</h3>
                                    <p className="text-xs text-slate-500 mt-1">{getTimeLabel(modalData.start)} - {getTimeLabel(modalData.end + 1)} ({(modalData.end - modalData.start + 1) * 30} 分钟)</p>
                                </div>
                                <div className="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                                    <div>
                                        <label className="flex items-center justify-between text-xs font-semibold text-slate-500 uppercase mb-3">
                                            <span>选择类别 (可拖拽排序)</span>
                                            <button onClick={addCategory} className="flex items-center gap-1 text-blue-600 hover:text-blue-700 bg-blue-50 px-2 py-1 rounded transition-colors normal-case"><Icon name="Plus" size={12}/> 添加</button>
                                        </label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {sortedCategories.map(cat => {
                                                const isCatEditing = editingCatId === cat.id, isSelected = modalData.categoryId === cat.id;
                                                return (
                                                    <div key={cat.id} draggable={!isCatEditing} onDragStart={(e) => {setDraggedCatId(cat.id); e.dataTransfer.effectAllowed="move";}} onDragOver={e => {e.preventDefault(); e.dataTransfer.dropEffect="move";}} onDrop={e => handleDrop(e, cat.id)}
                                                        className={`group relative flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-sm transition-all border ${isSelected && !isCatEditing ? `${cat.color} ${cat.text} border-transparent shadow-md` : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'} ${isCatEditing ? 'col-span-2 shadow-sm' : ''} ${draggedCatId === cat.id ? 'opacity-50' : 'opacity-100'}`}>
                                                        {!isCatEditing && <div className="shrink-0 cursor-grab active:cursor-grabbing text-slate-300 hover:text-slate-500 -ml-1"><Icon name="GripVertical" size={14}/></div>}
                                                        {!isCatEditing && <div className="shrink-0"><Icon name={cat.icon || 'Star'} size={14}/></div>}
                                                        
                                                        {isCatEditing ? (
                                                            <div className="w-full flex flex-col gap-2 z-10 p-1" onKeyDown={e => e.stopPropagation()}>
                                                                <div className="flex items-center gap-2 w-full">
                                                                    <div className="shrink-0"><Icon name={catEditIcon || cat.icon || 'Star'} size={14} className="text-slate-400"/></div>
                                                                    <input type="text" autoFocus value={catEditName} onChange={(e) => setCatEditName(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') saveCategoryName(cat.id); }} className="flex-1 bg-white text-slate-800 px-2 py-1 rounded outline-none border border-blue-300 shadow-inner text-xs" placeholder="类别名称..."/>
                                                                    <button onClick={() => saveCategoryName(cat.id)} className="shrink-0 bg-blue-600 hover:bg-blue-700 text-white p-1 rounded shadow-sm"><Icon name="Check" size={14}/></button>
                                                                </div>
                                                                <div className="flex flex-col gap-2">
                                                                    <div className="flex items-center gap-1.5 flex-wrap">
                                                                        {PRESET_COLORS.map((pc, idx) => (
                                                                            <button key={'c'+idx} onClick={(e) => { e.stopPropagation(); setCatEditColor(pc); }} className={`w-5 h-5 rounded-full shrink-0 border ${pc.color} ${pc.border} transition-all ${catEditColor?.color === pc.color ? 'ring-2 ring-offset-1 ring-blue-500 scale-110' : 'hover:scale-110'}`} />
                                                                        ))}
                                                                    </div>
                                                                    <div className="flex items-center gap-1.5 flex-wrap">
                                                                        {PRESET_ICONS.map((iconName, idx) => (
                                                                            <button key={'i'+idx} onClick={(e) => { e.stopPropagation(); setCatEditIcon(iconName); }} className={`p-1 rounded shrink-0 flex items-center justify-center ${catEditIcon === iconName ? 'bg-blue-100 text-blue-600 ring-1 ring-blue-400 scale-110' : 'bg-white text-slate-400 border border-slate-200 hover:bg-slate-100'}`}><Icon name={iconName} size={12} /></button>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <button onClick={() => setModalData({ ...modalData, categoryId: cat.id })} className="flex-1 text-left truncate py-1 outline-none font-medium">{cat.label}</button>
                                                        )}
                                                        {!isCatEditing && (
                                                            <div className="absolute right-1 top-1/2 -translate-y-1/2 flex items-center bg-black/60 rounded p-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={(e)=>{e.stopPropagation(); setEditingCatId(cat.id); setCatEditName(cat.label); setCatEditColor({ color: cat.color, border: cat.border, text: cat.text }); setCatEditIcon(cat.icon);}} className="p-1 text-white hover:text-blue-200"><Icon name="Edit2" size={10}/></button>
                                                                <button onClick={(e)=>{e.stopPropagation(); requestDeleteCategory(cat.id);}} className="p-1 text-white hover:text-red-300"><Icon name="Trash2" size={10}/></button>
                                                            </div>
                                                        )}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">具体内容 (选填)</label>
                                        <input type="text" autoFocus placeholder="输入任务明细..." className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-sm" value={modalData.activity} onChange={(e) => setModalData({ ...modalData, activity: e.target.value })} onKeyDown={(e) => { if (e.key === 'Enter') saveBlock(); }} />
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3 shrink-0">
                                    <button onClick={() => setModalOpen(false)} className="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-800">取消</button>
                                    <button onClick={saveBlock} disabled={!modalData.categoryId} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white text-sm font-semibold rounded-lg shadow-sm">保存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Google 云端冲突处理弹窗 */}
                    {conflictModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden animate-fade-in-zoom p-6">
                                <div className="flex items-center gap-3 mb-4">
                                    <Icon name="AlertTriangle" className="text-amber-500" size={24}/>
                                    <h3 className="font-bold text-slate-800 text-lg">云端数据冲突</h3>
                                </div>
                                <p className="text-sm text-slate-600 mb-4 leading-relaxed">
                                    发现其他设备更新了 Google Drive 中的备份。请选择保留哪一份数据：
                                </p>
                                <div className="bg-slate-50 p-3 rounded border border-slate-200 mb-6 space-y-2 text-xs">
                                    <div className="flex justify-between">
                                        <span className="text-slate-500">云端最后更新:</span>
                                        <span className="font-medium text-blue-600">{new Date(conflictModal.cloudTime).toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-500">本地最后修改:</span>
                                        <span className="font-medium text-amber-600">{new Date(conflictModal.localTime).toLocaleString()}</span>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <button onClick={() => resolveConflict('cloud')} className="w-full py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                                        <Icon name="Download" size={16}/> 下载并覆盖本地 (推荐)
                                    </button>
                                    <button onClick={() => resolveConflict('local')} className="w-full py-2.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                                        <Icon name="Upload" size={16}/> 强制使用本地覆盖云端
                                    </button>
                                    <button onClick={() => setConflictModal({ ...conflictModal, isOpen: false })} className="w-full py-2 text-sm font-medium text-slate-500 hover:text-slate-700 bg-transparent rounded-lg mt-2 transition-colors">
                                        稍后处理
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
